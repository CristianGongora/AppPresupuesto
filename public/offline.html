<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceAI - Sin conexión</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      width: 60px;
      height: 60px;
      color: #10b981;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #ffffff;
    }
    
    p {
      font-size: 16px;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    button {
      background: #10b981;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #059669;
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .logo {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: #10b981;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M16 8h-6a2 2 0 100 4h4a2 2 0 110 4H8"/>
          <path d="M12 18V6"/>
        </svg>
      </div>
      <span class="logo-text">FinanceAI</span>
    </div>
    
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
        <line x1="12" y1="2" x2="12" y2="12"/>
      </svg>
    </div>
    
    <h1>Sin conexión</h1>
    <p>Parece que no tienes conexión a internet. Verifica tu conexión e intenta de nuevo.</p>
    
    <button onclick="window.location.reload()">
      Reintentar
    </button>
  </div>
</body>
</html>
